<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sync App</title>

<style>
body { margin:0; background:#0b0b0f; color:#fff; font-family:Arial; }
.top { padding:10px; background:#12121a; display:flex; gap:5px; flex-wrap:wrap; }
input { flex:1; padding:10px; border:none; border-radius:6px; }
button { padding:10px; border:none; background:#5865f2; color:#fff; border-radius:6px; cursor:pointer; }
#player { width:100%; aspect-ratio:16/9; }

.queue-item {
  background:#1a1a24;
  margin:5px;
  padding:8px;
  border-radius:6px;
  display:flex;
  justify-content:space-between;
  cursor:pointer;
}

.msg { background:#1a1a24; padding:5px; margin:5px 0; border-radius:5px; }
</style>
</head>

<body>

<div class="top">
  <button onclick="createRoom()">Criar Sala</button>
  <input id="roomInput" placeholder="Código da sala">
  <button onclick="joinRoom()">Entrar</button>
</div>

<div class="top">
  <input id="ytLink" placeholder="Link YouTube">
  <button onclick="loadMedia()">▶</button>
  <button onclick="addQueue()">➕ Fila</button>
</div>

<div id="player"></div>

<div class="top">
  <button onclick="prevPlaylist()">⏮</button>
  <button onclick="play()">▶</button>
  <button onclick="pause()">⏸</button>
  <button onclick="nextPlaylist()">⏭</button>
  <button onclick="nextQueue()">⏭ Fila</button>
</div>

<h3>Fila</h3>
<div id="queue"></div>

<h3>Chat</h3>

<div class="top">
  <span id="userDisplay"></span>
  <button onclick="changeName()">Trocar Nome</button>
</div>

<div id="messages"></div>

<div class="top">
  <input id="msgInput">
  <button onclick="sendMsg()">Enviar</button>
</div>

<!-- libs -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>

<script>

// 🔥 TODAS SUAS FUNÇÕES JÁ EXISTEM ACIMA...

// 🔥 CORRIGIDO (AGORA DENTRO DO SCRIPT)
function play(){
  if(player){
    socket.emit("play",player.getCurrentTime());
  }

  // ANDROID AUDIO BACKGROUND
  if(window.Android){
    const audioUrl = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";
    Android.playAudio(audioUrl);
  }
}

function pause(){
  if(player){
    socket.emit("pause",player.getCurrentTime());
  }

  if(window.Android){
    Android.pauseAudio();
  }
}

</script>
</body>
</html>

</body>
</html>
