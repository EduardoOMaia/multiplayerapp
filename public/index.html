<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MultPlayer</title>
</head>
<body>

<h2>MultPlayer</h2>

<input id="room" placeholder="Sala">
<button onclick="join()">Entrar</button>

<br><br>

<input id="url" placeholder="URL MP3/MP4">
<button onclick="load()">Carregar</button>

<br><br>

<button onclick="play()">Play</button>
<button onclick="pause()">Pause</button>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
const socket = io("http://SEU_IP:3000");

let currentUrl = "";

function join(){
  socket.emit("join", document.getElementById("room").value);
}

function load(){
  const url = document.getElementById("url").value;
  currentUrl = url;
  socket.emit("load", url);

  Android.play(url);
}

function play(){
  socket.emit("play", 0);
  Android.resume();
}

function pause(){
  socket.emit("pause", 0);
  Android.pause();
}

/* RECEBENDO EVENTOS */
socket.on("load", (url)=>{
  Android.play(url);
});

socket.on("play", ()=>{
  Android.resume();
});

socket.on("pause", ()=>{
  Android.pause();
});
</script>

</body>
</html>
