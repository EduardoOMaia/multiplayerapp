<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sync App</title>

<style>
body { margin:0; background:#0b0b0f; color:#fff; font-family:Arial; }
.top { padding:10px; background:#12121a; display:flex; gap:5px; flex-wrap:wrap; }
input { flex:1; padding:10px; border:none; border-radius:6px; }
button { padding:10px; border:none; background:#5865f2; color:#fff; border-radius:6px; cursor:pointer; }
#player { width:100%; aspect-ratio:16/9; }
</style>
</head>

<body>

<div class="top">
  <button onclick="createRoom()">Criar Sala</button>
  <input id="roomInput" placeholder="Código da sala">
  <button onclick="joinRoom()">Entrar</button>
</div>

<div class="top">
  <input id="ytLink" placeholder="Link YouTube">
  <button onclick="loadMedia()">▶</button>
</div>

<div id="player"></div>

<div class="top">
  <button onclick="play()">▶</button>
  <button onclick="pause()">⏸</button>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>

<script>
const socket = io("https://multiplayerapp.onrender.com");

let player;

function onYouTubeIframeAPIReady(){
  player = new YT.Player("player", {
    height: "100%",
    width: "100%"
  });
}

function parseYouTube(url){
  try{
    const u = new URL(url);
    const v = u.searchParams.get("v");
    if(v) return v;
    if(u.hostname.includes("youtu.be")) return u.pathname.slice(1);
  }catch(e){}
  return null;
}

function loadMedia(){
  const id = parseYouTube(document.getElementById("ytLink").value);
  if(!id) return alert("Link inválido");
  socket.emit("load", id);
}

function play(){
  if(player) socket.emit("play");
}

function pause(){
  if(player) socket.emit("pause");
}

socket.on("load",(id)=>{
  if(player) player.loadVideoById(id);
});

socket.on("play",()=>{
  if(player) player.playVideo();
});

socket.on("pause",()=>{
  if(player) player.pauseVideo();
});

// 🔥 ESSAS FUNÇÕES PRECISAM EXISTIR
function createRoom(){
  socket.emit("create-room");
}

function joinRoom(){
  socket.emit("join-room", document.getElementById("roomInput").value);
}
</script>

</body>
</html>
