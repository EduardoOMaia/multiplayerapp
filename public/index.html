<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
</head>

<body>

<input id="ytLink">
<button onclick="loadMedia()">Carregar</button>
<button onclick="play()">Play</button>
<button onclick="pause()">Pause</button>

<div id="player"></div>

<script>
const socket = io("https://SEU_RENDER.onrender.com");

let player;

function onYouTubeIframeAPIReady(){
  player = new YT.Player("player");
}

function getId(url){
  const u = new URL(url);
  return u.searchParams.get("v");
}

function loadMedia(){
  const id = getId(document.getElementById("ytLink").value);
  socket.emit("load", {id});
}

function play(){
  const url = document.getElementById("ytLink").value;

  if(window.Android){
    const audioUrl = "https://SEU_RENDER.onrender.com/audio?url=" + encodeURIComponent(url);
    Android.playAudio(audioUrl);
  }

  player.playVideo();
}

function pause(){
  if(window.Android){
    Android.pauseAudio();
  }

  player.pauseVideo();
}

socket.on("load",(d)=>{
  player.loadVideoById(d.id);
});

socket.on("play",()=>player.playVideo());
socket.on("pause",()=>player.pauseVideo());
</script>

</body>
</html>
